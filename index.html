<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Temperature Sensor</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <h1>Digital Temperature Sensor</h1>

    <div class="temperature-display">
      <p>Current Temperature: <span id="tempValue">--</span>°C</p>
    </div>

    <div class="threshold">
      <label for="thresholdInput">Set Threshold (°C): </label>
      <input type="number" id="thresholdInput" placeholder="Enter threshold">
      <button id="setThresholdBtn">Set</button>
    </div>

    <div class="alert-message" id="alertMessage"></div>

    <button id="simulateBtn">Simulate Temperature</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
